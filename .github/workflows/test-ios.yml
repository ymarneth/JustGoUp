name: Test iOS

on:
  workflow_call:

jobs:
  test-ios:
    runs-on: macos-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Kotlin/Native
        uses: actions/cache@v3
        with:
          path: ~/.konan
          key: konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-

      - name: Run iOS tests
        run: |
          chmod +x ./gradlew
          ./gradlew :composeApp:iosSimulatorArm64Test

      - name: Publish test report
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v3
        with:
          name: iOS Test Report
          path: "composeApp/build/test-results/iosSimulatorArm64Test/*.xml"
          reporter: java-junit
