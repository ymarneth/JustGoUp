name: Android Build

on:
  workflow_call:
    inputs:
      project-dir:
        required: true
        type: string
      version:
        required: true
        type: string
    secrets:
      ANDROID_KEYSTORE_B64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apk-path: ${{ steps.set-output.outputs.artifact-path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Compute versionCode from version
        id: versioning
        run: |
          IFS='.' read -r major minor patch <<< "${{ inputs.version }}"
          VERSION_CODE=$((major * 10000 + minor * 100 + patch))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=${{ inputs.version }}" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Restore signing key
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > ${{ runner.temp }}/debug.keystore
          echo "ANDROID_KEYSTORE_PATH=${{ runner.temp }}/debug.keystore" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Kotlin/Native
        uses: actions/cache@v3
        with:
          path: ~/.konan
          key: konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-

      - name: Run tests
        run: |
          chmod +x ./gradlew
          ./gradlew :composeApp:allTests

      - name: Build Android Release
        run: |
          cd ${{ inputs.project-dir }}
          chmod +x ../gradlew
          ../gradlew assembleRelease

      - name: Rename APK with version
        run: |
          cd ${{ inputs.project-dir }}/build/outputs/apk/release
          for f in androidApp-release*.apk; do
            mv "$f" "justgoup-release-${{ inputs.version }}.apk"
          done

      - name: Upload APK artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: JustGoUp-Android-${{ inputs.version }}-Release
          path: ${{ inputs.project-dir }}/build/outputs/apk/release/justgoup-release-${{ inputs.version }}.apk

      - name: Set output
        id: set-output
        run: |
          echo "artifact-path=${{ inputs.project-dir }}/build/outputs/apk/release/justgoup-release-${{ inputs.version }}.apk" >> $GITHUB_OUTPUT

