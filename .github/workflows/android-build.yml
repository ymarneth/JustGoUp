name: Android Build

on:
  workflow_call:
    inputs:
      project-dir:
        required: true
        type: string
      version:
        required: false
        type: string

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apk-path: ${{ steps.upload.outputs.artifact-path }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: 34.0.0
          components: platform-tools,ndk-bundle

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('${{ inputs.project-dir }}/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Android Release
        run: |
          cd ${{ inputs.project-dir }}
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: JustGoUp-Android-${{ inputs.version }}-Release
          path: ${{ inputs.project-dir }}/build/outputs/apk/release/composeApp-release.apk

