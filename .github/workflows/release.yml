name: Release new version

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    uses: ./.github/workflows/versioning.yml
          
  build-android:
    uses: ./.github/workflows/android-build.yml
    needs: version
    with:
      project-dir: "JustGoUp/composeApp"
      version: ${{ needs.version.outputs.version }}
    secrets:
      ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

  create-release:
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: JustGoUp-Android-${{ needs.version.outputs.version }}-Release
          path: ./apk

      - name: Create draft GitHub release
        id: release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: JustGoUp Android ${{ needs.version.outputs.version }}
          body: Release ${{ needs.version.outputs.version }}
          draft: true           # draft, not published
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to draft release
        uses: softprops/action-gh-release@v1
        with:
          files: ./apk/composeApp-release-${{ needs.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

