name: Release new version

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    uses: ./.github/workflows/versioning.yml
          
  build-android:
    uses: ./.github/workflows/android-build.yml
    needs: version
    with:
      project-dir: "JustGoUp/composeApp"
      version: ${{ needs.version.outputs.version }}
    secrets:
      ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

  create-release:
    needs: [version, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: JustGoUp-Android-${{ needs.version.outputs.version }}-Release
          path: ./apk

      - name: Create GitHub release
        id: release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: JustGoUp Android ${{ needs.version.outputs.version }}
          body: Release ${{ needs.version.outputs.version }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ./apk/composeApp-release-${{ needs.version.outputs.version }}.apk
          asset_name: composeApp-release-${{ needs.version.outputs.version }}.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

