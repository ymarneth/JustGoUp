name: Test Android

on:
  workflow_call:

jobs:
  test-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Android SDK
        run: |
          SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | sort -V | tail -1)
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          COMPILE_SDK=$(grep -oP 'android-compileSdk = "\K[0-9]+' gradle/libs.versions.toml)
          for i in 1 2 3; do
            "$SDKMANAGER" "platform-tools" "platforms;android-$COMPILE_SDK" && break
            echo "sdkmanager attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Kotlin/Native
        uses: actions/cache@v3
        with:
          path: ~/.konan
          key: konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-

      - name: Run Android tests
        run: |
          chmod +x ./gradlew
          ./gradlew :composeApp:testAndroidHostTest

      - name: Publish test report
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v3
        with:
          name: Android Test Report
          path: "composeApp/build/test-results/testAndroidHostTest/*.xml"
          reporter: java-junit
