name: Set up Android SDK
description: >
  Accepts Android SDK licenses using the cmdline-tools already present on the
  GitHub-hosted runner. Does not pre-install any platform packages —
  Gradle/AGP auto-downloads whatever compileSdk actually needs during the
  build itself.

runs:
  using: composite
  steps:
    - name: Accept Android SDK licenses
      shell: bash
      run: |
        SDK_ROOT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
        echo "ANDROID_HOME=$ANDROID_HOME"
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        echo "Using SDK_ROOT=$SDK_ROOT"

        SDKMANAGER=$(find "$SDK_ROOT/cmdline-tools" -name sdkmanager -type f 2>/dev/null | sort -V | tail -1)
        echo "Resolved sdkmanager: ${SDKMANAGER:-<not found>}"

        if [ -z "$SDKMANAGER" ]; then
          echo "::error::Could not find sdkmanager under \$SDK_ROOT/cmdline-tools ($SDK_ROOT)"
          find "$SDK_ROOT" -maxdepth 2 2>/dev/null || echo "SDK_ROOT does not exist"
          exit 1
        fi

        # sdkmanager --licenses can report a non-zero exit code from the `yes`
        # pipe closing (SIGPIPE) even after successfully accepting every
        # license -- its own "All SDK package licenses accepted" output
        # appears before the reported failure. Treat this as best-effort; a
        # genuine license or network problem instead surfaces as a clear
        # failure in the actual Gradle build that follows this step.
        yes | "$SDKMANAGER" --licenses > /dev/null || true
